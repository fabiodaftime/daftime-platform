name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    name: Validate, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 🚦 GATE: Digit YTD continuous validation.
      # Fails the pipeline (and therefore blocks deploy) as soon as any
      # additive YTD ≠ Σ months OR any average YTD doesn't match its formula.
      - name: Validate Digit YTD (additive + average)
        run: npm run validate:ytd

      # Vitest mirrors the same checks as automated tests for visibility.
      - name: Run tests (incl. YTD validation tests)
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
